# fly.toml app configuration file generated for mental-dojo-server on 2026-07-07T11:26:06+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mental-dojo-server'
primary_region = 'jnb'

[build]
  builder = 'paketobuildpacks/builder:base'
  dockerfile = "Dockerfile"

[env]
  PORT = '8080'
  

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
